name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - test
      - main

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI verification
        run: bun run verify:ci

  # Staging deploy is intentionally disabled for now while only the production
  # Railway target is being configured and tested.
  #
  # deploy-staging:
  #   name: Deploy Staging
  #   runs-on: ubuntu-latest
  #   needs: verify
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/test'
  #   environment:
  #     name: staging
  #   env:
  #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  #     RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
  #
  #   steps:
  #     - name: Check out code
  #       uses: actions/checkout@v4
  #
  #     - name: Set up Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: 20
  #
  #     - name: Install Railway CLI
  #       run: npm install --global @railway/cli
  #
  #     - name: Validate Railway deploy inputs
  #       run: |
  #         test -n "$RAILWAY_TOKEN" || { echo "Missing RAILWAY_TOKEN"; exit 1; }
  #         test -n "$RAILWAY_SERVICE_NAME" || { echo "Missing RAILWAY_SERVICE_NAME"; exit 1; }
  #
  #     - name: Deploy to Railway staging
  #       run: railway up --ci --service "$RAILWAY_SERVICE_NAME"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Validate Railway deploy inputs
        run: |
          test -n "$RAILWAY_TOKEN" || { echo "Missing RAILWAY_TOKEN"; exit 1; }
          test -n "$RAILWAY_SERVICE_NAME" || { echo "Missing RAILWAY_SERVICE_NAME"; exit 1; }

      - name: Deploy to Railway production
        run: railway up --ci --service "$RAILWAY_SERVICE_NAME"
